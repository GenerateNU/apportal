          type: string
        submit:
          description: When true, marks the review as submitted
          type: boolean
      type: object
    UpsertSelectionInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpsertSelectionInputBody.json
          format: uri
          readOnly: true
          type: string
        note:
          type: string
      type: object
    UpsertWrittenReviewInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpsertWrittenReviewInputBody.json
          format: uri
          readOnly: true
          type: string
        answer_scores:
          items:
            $ref: "#/components/schemas/AnswerScoreSubmission"
          type:
            - array
            - "null"
        overall_score:
          format: int64
          maximum: 10
          minimum: 1
          type: integer
        reasoning:
          type: string
        submit:
          description: When true, marks the review as submitted
          type: boolean
      type: object
    User:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/User.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: date-time
          type: string
        email:
          type: string
        full_name:
          type: string
        github_username:
          type: string
        graduation_year:
          format: int64
          type: integer
        major:
          type: string
        nuid:
          type: string
        roles:
          items:
            enum:
              - applicant
              - member
              - lead
              - chief
              - admin
            type: string
          type:
            - array
            - "null"
        updated_at:
          format: date-time
          type: string
      required:
        - nuid
        - email
        - full_name
        - roles
        - created_at
        - updated_at
      type: object
    WrittenAnswer:
      additionalProperties: false
      properties:
        answer_options: {}
        answer_text:
          type: string
        application_id:
          type: string
        id:
          type: string
        question_id:
          type: string
        submitted_at:
          format: date-time
          type: string
      required:
        - id
        - application_id
        - question_id
        - submitted_at
      type: object
    WrittenReviewAnswerScore:
      additionalProperties: false
      properties:
        answer_id:
          type: string
        comment:
          type: string
        id:
          type: string
        review_id:
          type: string
        score:
          format: int64
          type: integer
      required:
        - id
        - review_id
        - answer_id
      type: object
    WrittenReviewDetail:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/WrittenReviewDetail.json
          format: uri
          readOnly: true
          type: string
        answer_scores:
          items:
            $ref: "#/components/schemas/WrittenReviewAnswerScore"
          type:
            - array
            - "null"
        application_id:
          type: string
        created_at:
          format: date-time
          type: string
        id:
          type: string
        overall_score:
          format: int64
          type: integer
        reasoning:
          type: string
        reviewer_nuid:
          type: string
        submitted_at:
          format: date-time
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - answer_scores
        - id
        - application_id
        - reviewer_nuid
        - created_at
        - updated_at
      type: object
info:
  description: Generate application portal — applications, reviews, and the hiring pipeline.
  title: apportal API
  version: 0.1.0
openapi: 3.1.0
paths:
  /applicants:
    post:
      description: Applicant-facing; upserts by NUID.
      operationId: upsert-applicant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertApplicantInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Applicant"
          description: OK
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Conflict
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Create or update an applicant
      tags:
        - Applicants
  /applicants/{nuid}:
    get:
      operationId: get-applicant
      parameters:
        - in: path
          name: nuid
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Applicant"
          description: OK
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Get an applicant
      tags:
        - Applicants
  /applications:
    get:
      description: Reviewer queue; filter by cycle_id, role, and stage.
      operationId: list-applications
      parameters:
        - explode: false
          in: query
          name: cycle_id
          schema:
            type: string
        - explode: false
          in: query
          name: role
          schema:
            type: string
        - explode: false
          in: query
          name: stage
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Application"
                type:
                  - array
                  - "null"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: List applications
      tags:
        - Applications
    post:
      description: One application per applicant, role, and cycle.
      operationId: create-application
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
          description: Created
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Conflict
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Submit an application
      tags:
        - Applications
  /applications/{id}:
    get:
      operationId: get-application
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
          description: OK
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Get an application
      tags:
        - Applications
    patch:
      description: Set resume_url, availability, or advance/withdraw the stage.
      operationId: update-application
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
          description: OK
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Update an application
      tags:
        - Applications
  /applications/{id}/answers:
    get:
      operationId: list-answers
      parameters:
        - description: Application ID
          in: path
          name: id
          required: true
          schema:
            description: Application ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/WrittenAnswer"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List an application's written answers
      tags:
        - Answers
    put:
      description: Bulk upsert keyed on (application, question).
      operationId: upsert-answers
      parameters:
        - description: Application ID
          in: path
          name: id
          required: true
          schema:
            description: Application ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertAnswersInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/WrittenAnswer"
                type:
                  - array
                  - "null"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Submit or update written answers
      tags:
        - Answers
  /applications/{id}/chief-review:
    put:
      description: Chief only. Setting advance_to_interview records the decision.
      operationId: upsert-chief-review
      parameters:
        - description: Application ID
          in: path
