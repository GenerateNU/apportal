              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Submit or update your chief review
      tags:
        - Chief reviews
  /applications/{id}/chief-reviews:
    get:
      operationId: list-chief-reviews
      parameters:
        - description: Application ID
          in: path
          name: id
          required: true
          schema:
            description: Application ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ChiefReview"
                type:
                  - array
                  - "null"
          description: OK
        "401":
          content:
            application/problem+json:
