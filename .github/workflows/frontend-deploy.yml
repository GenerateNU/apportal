# NOTE: This workflow currently only builds the frontend — no deploy step is
# wired yet. It verifies `main` produces a deployable production build. When a
# hosting target is chosen (Vercel, Fly.io, AWS, etc.), add the deploy step in
# the placeholder at the bottom of the `deploy` job and store any credentials as
# repository secrets on the `production` environment.
name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      # TODO(deploy): no hosting target chosen yet — this job stops after a
      # successful production build. Add the deploy step here once decided:
      #   - Vercel:  `npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}`
      #   - Fly.io:  `flyctl deploy` (with FLY_API_TOKEN)
      #   - AWS:     upload/build via the relevant AWS action
      # Store credentials as secrets on the `production` environment above.
